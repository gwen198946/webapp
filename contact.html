<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playwrite+IE:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="texte.css">
</head>

<body>
    <header>
        <h1>Hello couvin</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="contact.html">contact</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Contactez-nous !</h2>
            <div class="colonnes">
                <h3>par email</h3>
                <div class="colonne">
                    <form>
                        <div class="control">
                            <label for="lastname">nom</label>
                            <input type="text" id="lastname" required>*
                        </div>
                        <div class="control">
                            <label for="firstname">prenom</label>
                            <input type="text" id="firstname">
                        </div>
                        <div class="control">
                            <label for="email">email</label>
                            <input type="email" required id="email">*
                        </div>
                        <div class="control">
                            <label for="profil">profil</label>
                            <select name="" id="profil">
                                <option value="DE">demandeur d'emploie</option>
                                <option value="TRAV">travailleur</option>
                            </select>
                        </div>
                        <div class="control">
                            <label for="message">message</label>
                            <textarea name="" id="message"></textarea>
                        </div>
                        <button>envoyer</button>
                    </form>
                </div>
                <div class="colonne"><iframe width="425" height="350"
                        src="https://www.openstreetmap.org/export/embed.html?bbox=4.496605396270753%2C50.073102881674814%2C4.532439708709718%2C50.08546831141369&amp;layer=mapnik"
                        style="border: 1px solid black"></iframe><br /><small><a
                            href="https://www.openstreetmap.org/?#map=16/50.07929/4.51452">View Larger Map</a></small>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
